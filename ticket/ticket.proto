syntax = "proto3";

package weebi.ticket;

import "article/article.proto";
import "ticket/ticket_type.proto";
import "common/g_timestamp.proto";
import "common/options.proto";

/// ticketNonUniqueId is to be combined with userId
/// local ids can lead to duplicates as each sellers from its own device can create contact
message TicketMongo {
    weebi.ticket.TicketPb ticket = 1 [json_name = 'ticket'];
    int32 nonUniqueId = 2 [json_name = 'nonUniqueId'];
    string userId = 3 [json_name = 'userId'];
    string boutiqueId = 4 [json_name = 'boutiqueId'];
    string firmId = 5 [json_name = 'firmId'];
    string chainId = 6 [json_name = 'chainId'];
    string creationDate = 7 [json_name = 'creationDate'];
    google.protobuf.Timestamp lastTouchTimestampUTC =  8 [json_name = 'lastTouchTimestampUTC']; 
    bool isDeleted = 9 [json_name = 'isDeleted'];
    int32 contactId = 10 [json_name = 'contactId'];
    reserved 11 to 98;
    map<string, string> additional_attributes = 99  [json_name = 'additional_attributes'];
}
// string uploadByuserId = 3 [json_name = 'uploadByuserId'];
// string uploadByUsername = 4 [json_name = 'uploadByUsername'];
// google.protobuf.Timestamp dateUploadUTC = 5 [json_name = 'dateUploadUTC'];
// string lastTouchedByuserId = 6 [json_name = 'lastTouchedByuserId'];
// string lastTouchedByUsername = 7 [json_name = 'lastTouchedByUsername'];

// ---------------------------------------------------------------------------
// Totals sub-messages — referenced by the oneof totals in TicketPb.
//
// All formula annotations reference sibling fields within this message PLUS
// parent-scope fields from TicketPb (promo, discountAmount, taxe, received,
// items, ticketType) supplied at evaluation time.
//
// Computation chain (same structure for sell and spend; differs only in
// whether items_only sums total_price or total_cost):
//
//   items_only
//     → promo_val                     = round4(items_only × promo / 100)
//     → markdowns_val                 = promo_val + discountAmount
//     → markdowns_included_tax_excluded = items_only − markdowns_val
//     → taxes_value                   = round4(markdowns_included_tax_excluded × taxe.percentage / 100)
//     → markdowns_and_tax_included    = markdowns_included_tax_excluded + taxes_value
//     → change                        = received − markdowns_and_tax_included  (0 when deferred)
// ---------------------------------------------------------------------------

// Sell totals — set when ticketType is sell or sellDeferred.
message TicketSellTotalsPb {
  double items_only = 1 [
    (weebi.options.formula) = "items.sum(i, i.total_price)",
    json_name = "itemsOnly"
  ];
  double promo_val = 2 [
    (weebi.options.formula) = "round4(items_only * promo / 100)",
    json_name = "promoVal"
  ];
  // promo_val + discountAmount
  double markdowns_val = 3 [
    (weebi.options.formula) = "promo_val + discountAmount",
    json_name = "markdownsVal"
  ];
  // items_only minus all markdowns, before taxes
  double markdowns_included_tax_excluded = 4 [
    (weebi.options.formula) = "items_only - markdowns_val",
    json_name = "markdownsIncludedTaxExcluded"
  ];
  double taxes_value = 5 [
    (weebi.options.formula) = "taxe.percentage > 0.0 ? round4(markdowns_included_tax_excluded * (taxe.percentage / 100)) : 0.0",
    json_name = "taxesValue"
  ];
  double markdowns_and_tax_included = 6 [
    (weebi.options.formula) = "markdowns_included_tax_excluded + taxes_value",
    json_name = "markdownsAndTaxIncluded"
  ];
  // received − markdowns_and_tax_included; 0 when sellDeferred
  double change = 7 [
    (weebi.options.formula) = "ticketType == 'sell' ? received - markdowns_and_tax_included : 0.0",
    json_name = "change"
  ];
}

// Spend totals — set when ticketType is spend or spendDeferred.
// Same computation chain as TicketSellTotalsPb but items_only sums total_cost.
message TicketSpendTotalsPb {
  double items_only = 1 [
    (weebi.options.formula) = "items.sum(i, i.total_cost)",
    json_name = "itemsOnly"
  ];
  double promo_val = 2 [
    (weebi.options.formula) = "round4(items_only * promo / 100)",
    json_name = "promoVal"
  ];
  double markdowns_val = 3 [
    (weebi.options.formula) = "promo_val + discountAmount",
    json_name = "markdownsVal"
  ];
  double markdowns_included_tax_excluded = 4 [
    (weebi.options.formula) = "items_only - markdowns_val",
    json_name = "markdownsIncludedTaxExcluded"
  ];
  double taxes_value = 5 [
    (weebi.options.formula) = "taxe.percentage > 0.0 ? round4(markdowns_included_tax_excluded * (taxe.percentage / 100)) : 0.0",
    json_name = "taxesValue"
  ];
  double markdowns_and_tax_included = 6 [
    (weebi.options.formula) = "markdowns_included_tax_excluded + taxes_value",
    json_name = "markdownsAndTaxIncluded"
  ];
  // received − markdowns_and_tax_included; 0 when spendDeferred
  double change = 7 [
    (weebi.options.formula) = "ticketType == 'spend' ? received - markdowns_and_tax_included : 0.0",
    json_name = "change"
  ];
}

// Cover totals — set when ticketType is sellCovered, spendCovered, or wage.
// No item computation: total equals the received amount.
message TicketCoverTotalPb {
  double total = 1 [
    (weebi.options.formula) = "received",
    json_name = "total"
  ];
}

// ---------------------------------------------------------------------------

message TicketPb {
  int32 nonUniqueId = 1 [json_name = 'id'];
  // different from article and contact
  // a ticket must include a firm/chain/boutique/user
  // the server will check they fit the permissions
  Counterfoil counterfoil = 2 [json_name = 'counterfoil'];
  enum PaymentTypePb {
    unknown = 0;
    cash = 1 ;
    nope = 2 ;
    mobileMoney = 3 ;
    cheque = 4 ;
    creditCard = 5 ;
    goods = 6 ;
    }
  /// when the ticket should be taken into account accountingly speaking
  string date = 3 [json_name = 'date'];
  string statusUpdateDate = 4 [json_name = 'statusUpdateDate'];
  bool status = 5 [json_name = 'status'];
  repeated ItemCartPb items = 6 [json_name = 'items'];
  weebi.ticket_type.TicketTypePb ticketType = 7 [json_name = 'ticketType'];
  PaymentTypePb paymentType = 8 [json_name = 'paymentType'];
  int32 contactId = 9 [json_name = 'contactId'];
  TaxPb taxe = 10 [json_name = 'taxe'];
  double promo = 11 [json_name = 'promo'];
  double received = 12 [json_name = 'received'];
  double discountAmount = 13 [json_name = 'discountAmount'];
  string comment = 14 [json_name = 'comment'];
  /// when the ticket was created
  string creationDate = 15 [json_name = 'creationDate'];

  // complementary contact fields that need to be stored on ticket in case contacts change
  string contactFirstName = 16 [json_name = 'contactFirstName'];
  string contactLastName = 17 [json_name = 'contactLastName'];
  string contactPhone = 18 [json_name = 'contactPhone'];
  string contactMail = 19 [json_name = 'contactMail'];
  optional string currency = 20 [json_name = 'currency'];
  /// ISO 4217 secondary currency (e.g. USD) shown at sale time alongside local amounts. Empty = no snapshot.
  optional string snapshot_secondary_currency = 21 [json_name = 'snapshotSecondaryCurrency'];
  /// Units of local (boutique) currency for one unit of snapshot_secondary_currency (e.g. 2800 means 1 USD = 2800 CDF).
  optional double snapshot_local_per_secondary = 22 [json_name = 'snapshotLocalPerSecondary'];

  // client_computed 
  // one case is set based on ticketType:
  //   sell / sellDeferred   → sell_totals
  //   spend / spendDeferred → spend_totals
  //   sellCovered / spendCovered / wage → cover_totals
  //   stock types           → (unset)
  oneof totals {
    TicketSellTotalsPb  sell_totals  = 23;
    TicketSpendTotalsPb spend_totals = 24;
    TicketCoverTotalPb  cover_totals = 25;
  }

  optional string replaced_ticket_id = 26 [json_name = 'replacedTicketId'];

  reserved 27 to 98;
}

message Counterfoil {
  string firmId = 1;
  string firmName = 2;
  string chainId = 3;
  string chainName = 4;
  string deviceId = 5;
  string deviceName = 6;
  string boutiqueId = 7;
  string boutiqueName = 8;
  /// userId is the user who synced the ticket, not necessarily the one who created it
  string userId = 9;
  string userName = 10;
}

message TaxPb {
  string id = 1;
  string name = 2;
  double percentage = 3;
}

message ProxyArticleWorthPb {
  int32 calibreId = 1 [json_name = 'calibreId'];
  int32 articleId = 2 [json_name = 'articleId'];
  int32 id = 3 [json_name = 'id'];
  bool status = 4 [json_name = 'status'];
  int32 proxyCalibreId = 5 [json_name = 'proxyCalibreId'];
  int32 proxyArticleId = 6 [json_name = 'proxyArticleId'];
  double minimumUnitPerBasket = 7 [json_name = 'minimumUnitPerBasket'];
  double articleWeight = 8 [json_name = 'articleWeight'];
  double price = 9 [json_name = 'price'];
  double cost = 10 [json_name = 'cost'];
}

message ItemCartPb {
  weebi.article.ArticleRetailOnTicketPb articleRetail = 1;
  weebi.article.ArticleBasketOnTicketPb articleBasket = 2;
  weebi.article.ArticleUncountableOnTicketPb articleUncountable = 3;
  double quantity = 4;
  repeated ProxyArticleWorthPb proxies_worth = 5;
  double inventoryAbsoluteQt = 6;
  // client_computed 
  // quantity × articlePrice, where articlePrice resolves as:
  //   retail      → articleRetail.price
  //   uncountable → articleUncountable.price  (quantity is always 1)
  //   basket      → sum(round(p.price × p.minimumUnitPerBasket) for p in proxies_worth)
  //                 − articleBasket.discountAmount + articleBasket.markupAmount
  double total_price = 7 [
    (weebi.options.formula) = "quantity * articlePrice",
    json_name = "totalPrice"
  ];
  // client_computed 
  // quantity × articleCost, where articleCost resolves as:
  //   retail      → articleRetail.cost
  //   uncountable → articleUncountable.cost   (quantity is always 1)
  //   basket      → sum(round(p.cost × p.minimumUnitPerBasket) for p in proxies_worth)
  //                 (no discount or markup on the cost side — purchase)
  double total_cost = 8 [
    (weebi.options.formula) = "quantity * articleCost",
    json_name = "totalCost"
  ];
}
