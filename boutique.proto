syntax = "proto3";

package weebi.boutique;

import "common/phone.proto";
import "common/address.proto";
import "device.proto";
import "common/g_timestamp.proto";


message BoutiqueMongo {
    BoutiquePb boutique = 1 [json_name = 'boutique']; 
    string boutiqueId = 2 [json_name = 'boutiqueId']; // assigned by the server
    string firmId = 3 [json_name = 'firmId'];
    string chainId = 4 [json_name = 'chainId'];
    google.protobuf.Timestamp creationTimestampUTC = 5 [json_name = 'creationTimestampUTC'];
    string name = 6 [json_name = 'name'];
    repeated weebi.device.Device devices = 7 [json_name = 'devices'];
    google.protobuf.Timestamp lastTouchTimestampUTC =  8 [json_name = 'lastTouchTimestampUTC']; 
    bytes logo = 9 [json_name = 'logo'];
    /// extension here is a string, e.g. png or jpeg (!= enum in ArticlePhotoPb)
    string logoExtension = 10 [json_name = 'logoExtension'];
    bool isDeleted = 11 [json_name = 'isDeleted'];
    string deletedBy = 12 [json_name = 'deletedBy']; // userId who deleted it
    string restoredBy = 13 [json_name = 'restoredBy']; // userId who restored it (empty if never restored)
    reserved 14 to 98;
    map<string, string> additional_attributes = 99  [json_name = 'additional_attributes'];
}


message BoutiquePb {
    string boutiqueId = 1 [json_name = 'boutiqueId'];
    string creationDate = 2 [json_name = 'creationDate'];
    string updateDate = 3 [json_name = 'updateDate'];
    string statusUpdateDate = 4 [json_name = 'statusUpdateDate', deprecated = true]; // dont use this field, use lastTouchTimestampUTC instead
    bool status = 5 [json_name = 'status', deprecated = true]; // dont use this field, use isDeleted instead
    string name = 6 [json_name = 'name'];
    weebi.common.phone.Phone phone = 7 [json_name = 'phone'];
    weebi.common.address.Address addressFull = 8 [json_name = 'addressFull'];
    double promo = 9 [json_name = 'promo'];
    string promoStart = 10 [json_name = 'promoStart'];
    string promoEnd = 11 [json_name = 'promoEnd'];
    bool isDeleted = 12 [json_name = 'isDeleted'];
    string deletedBy = 13 [json_name = 'deletedBy']; // userId who deleted it
    string restoredBy = 14 [json_name = 'restoredBy']; // userId who restored it (empty if never restored)
    string mail = 15 [json_name = 'mail'];
    /// ISO 4217 billing currency for this boutique. Empty: inherit chain then firm then platform default.
    optional string currency = 16 [json_name = 'currency'];
    /// When true, PoS/web clients may show amounts in secondaryDisplayCurrency (display-only; same semantics as chain/firm).
    optional bool isDualCurrencyEnabled = 17 [json_name = 'dualCurrencyEnabled'];
    /// ISO 4217 secondary display code (e.g. USD). Meaningful when isDualCurrencyEnabled is true.
    optional string secondaryDisplayCurrency = 18 [json_name = 'secondaryDisplayCurrency'];
    optional BusinessRules businessRules = 19 [json_name = 'businessRules'];
    reserved 20 to 100;
// below was misleading, if an attribute is needed, open an issue/a PR to add it
// map<string, string> additional_attributes = 100  [json_name = 'additional_attributes'];
   }
   
   
// since a firm may contain different chains with different business realities. 
// we prefer to put business rules at the chain level
// declared here to avoid circular dependency with boutique.proto
message BusinessRules {
    // guard against negative stocks in the chain when true
    bool isNegativeStockGuardEnabled = 1 [json_name = 'isNegativeStockGuardEnabled'];
    
    // allow recent ticket edit in the chain when true
    bool isRecentTicketEditEnabled = 2 [json_name = 'isRecentTicketEditEnabled'];
    int32 recentTicketEditWindowMinutes = 3 [json_name = 'recentTicketEditWindowMinutes']; // e.g. 5 minutes
  }
  