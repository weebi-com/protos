syntax = "proto3";

package weebi.firm;

import "common/g_timestamp.proto";
import "common/g_common.proto";
import "license.proto";

message Firm {
    string firmId = 1 [json_name = 'firmId'];
    string name = 2 [json_name = 'name'];
    /// @deprecated Use licenses instead.
    string subscriptionPlan = 3 [json_name = 'subscriptionPlan', deprecated = true];
    /// @deprecated Use licenses[].maxUsers instead.
    int32 subscriptionSeats =  4 [json_name = 'subscriptionSeats', deprecated = true]; //  1 seat == 1 user/device
    /// @deprecated Use licenses[].validFrom instead.
    google.protobuf.Timestamp subscriptionStartTimestampUTC =  5 [json_name = 'subscriptionStartTimestampUTC', deprecated = true];
    /// @deprecated Use licenses[].validUntil and LicenseSeat.validUntil instead.
    google.protobuf.Timestamp subscriptionEndTimestampUTC =  6 [json_name = 'subscriptionEndTimestampUTC', deprecated = true];
    bool status =  7 [json_name = 'status'];
    google.protobuf.Timestamp statusUpdateTimestampUTC =  8 [json_name = 'statusUpdateTimestampUTC']; //if weebi disables date will be in UTC time not local 
    google.protobuf.Timestamp lastUpdateTimestampUTC =  9 [json_name = 'lastUpdateTimestampUTC'];
    string lastUpdatedByuserId =  10 [json_name = 'lastUpdatedByuserId'];
    bool isMailVerified =  11 [json_name = 'isMailVerified'];
    google.protobuf.Timestamp creationDateUTC = 12 [json_name = 'creationDateUTC'];
    string stripeCustomerId = 13 [json_name = 'stripeCustomerId'];
    /// Active licenses. A firm can have multiple licenses (e.g. add-ons, renewals).
    repeated weebi.license.License licenses = 14 [json_name = 'licenses'];
    /// Customer IDs per payment provider. Keys: "stripe", "pawapay", etc.
    map<string, string> providerCustomerIds = 15 [json_name = 'providerCustomerIds'];
    /// Per-firm referral code. Share with others; 20% commission on referred license sales.
    string referralCode = 16 [json_name = 'referralCode'];
    /// Referral credit balance in EUR cents. Auto-applied at checkout or cash-out above €15.
    int32 referralCreditBalanceCents = 17 [json_name = 'referralCreditBalanceCents'];
  }

message CreateFirmRequest {
  /// mandatory
  string name = 1 [json_name = 'name'];
}

message CreateFirmResponse {
  google.retail.common.StatusResponse statusResponse = 1 [json_name = 'statusResponse'];
  Firm firm = 2 [json_name = 'firm'];
}